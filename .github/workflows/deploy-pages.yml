name: Deploy Browser Demo

# Publishes the browser build of Grimoire to GitHub Pages as a live, playable
# demo. The production build runs in mock-Tauri mode in a plain browser, so the
# static bundle is a self-contained Grimoire pre-loaded with demo content — no
# install, no backend. Served under the project-pages subpath via
# GRIMOIRE_BASE_PATH=/grimoire/.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy browser demo
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build browser demo
        env:
          GRIMOIRE_BASE_PATH: /grimoire/
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
