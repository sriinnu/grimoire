<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style nonce="grimoire-runtime-style">
      :root {
        color-scheme: light;
        background: #FFFFFF;
        color: #37352F;
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
        background: #1F1E1B;
        color: #E6E1D8;
      }
      body {
        background: inherit;
        color: inherit;
      }
    </style>
    <title>Grimoire</title>
  </head>
  <body>
    <script nonce="grimoire-runtime-style">
      (function () {
        var key = 'grimoire-theme';
        var legacyKey = 'tolaria-theme';
        var laputaLegacyKey = 'laputa-theme';
        function normalizeTheme(value) {
          return value === 'dark' || value === 'light' ? value : null;
        }
        function applyTheme(value) {
          var mode = normalizeTheme(value) || 'light';
          document.documentElement.setAttribute('data-theme', mode);
          document.documentElement.classList.toggle('dark', mode === 'dark');
        }
        try {
          var mode = normalizeTheme(localStorage.getItem(key));
          if (mode === null) {
            mode = normalizeTheme(localStorage.getItem(legacyKey));
            if (mode === null) {
              mode = normalizeTheme(localStorage.getItem(laputaLegacyKey));
            }
            if (mode !== null) localStorage.setItem(key, mode);
          }
          applyTheme(mode);
        } catch (err) {
          applyTheme('light');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
