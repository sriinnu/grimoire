name: GrimoireApple
options:
  bundleIdPrefix: com.sriinnu
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  MarkdownEditor:
    path: ../../markdown-editor/packages/swift

targets:
  Grimoire:
    type: application
    platform: macOS
    sources:
      - path: Sources/Shared
      - path: Sources/macOS
      - path: Assets.xcassets
    dependencies:
      - package: MarkdownEditor
        product: MarkdownEditor
      - package: MarkdownEditor
        product: MarkdownEditorUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sriinnu.grimoire
        PRODUCT_NAME: Grimoire
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES

  Grimoire-iOS:
    type: application
    platform: iOS
    productName: Grimoire
    sources:
      - path: Sources/Shared
      - path: Sources/iOS
      - path: Assets.xcassets
    dependencies:
      - package: MarkdownEditor
        product: MarkdownEditor
      - package: MarkdownEditor
        product: MarkdownEditorUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sriinnu.grimoire
        PRODUCT_NAME: Grimoire
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
